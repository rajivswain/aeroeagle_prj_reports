<style>

.container{
  background:white;
  padding:30px 40px;
  border-radius:10px;
  display:inline-block;
  box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.input-wrap{
  position:relative;
  display:inline-block;
}

  padding:10px;

  font-size:16px;

}

.eye{
  position:absolute;
  right:10px;

<br>

<button onclick="checkPassword()">Open Report</button>

  }

};


// ================= GET REPORT KEY =================

const params = new URLSearchParams(window.location.search);
const key = params.get("r");


// ================= PAGE VALIDATION =================

if(!key){

document.getElementById("title").innerHTML="No report specified";
document.getElementById("password").style.display="none";
document.querySelector("button").style.display="none";

}
else if(!REPORTS[key]){

document.getElementById("title").innerHTML="Invalid report link";
document.getElementById("password").style.display="none";
document.querySelector("button").style.display="none";

}
else{

document.getElementById("title").innerText = REPORTS[key].title;
document.title = REPORTS[key].title;

}


// ================= PASSWORD CHECK =================

function checkPassword(){

let entered=document.getElementById("password").value;

if(entered===REPORTS[key].password){

document.getElementById("result").innerHTML="✔ Access Granted";

setTimeout(function(){

window.location.replace(REPORTS[key].link);

},800);

}
else{

document.getElementById("result").innerHTML="✖ Wrong Password";

}

}


// ================= SHOW / HIDE PASSWORD =================

function togglePassword(){

let field=document.getElementById("password");

field.type = field.type === "password" ? "text" : "password";

}


// ================= ENTER KEY SUPPORT =================

document.getElementById("password").addEventListener("keypress",function(e){

if(e.key==="Enter"){
checkPassword();
}

});
